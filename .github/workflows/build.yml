name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore npm dependencies
        run: npm ci

      - name: Restore .NET dependencies
        run: dotnet restore FlightTracker.sln

      - name: Build
        run: dotnet build FlightTracker.sln --configuration Release --no-restore
